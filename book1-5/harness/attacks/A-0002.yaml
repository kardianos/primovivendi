summary: >
  "Truth corresponds to reality" smuggles a political settlement about who gets
  to certify reality. Observation is theory-laden; institutions decide which
  distinctions count. Your theft scene assumes a neutral human nature when the
  categories "theft," "incentive," and "deprivation" are already contested
  social products. Correspondence is not a foundation; it is a rhetoric of power.
quote: ""
source_ref: foucault_power_knowledge
subversion: >
  Every later appeal to "what works" can be redescribed as dominant-group
  interest, emptying procedural symmetry of any non-circular content.
